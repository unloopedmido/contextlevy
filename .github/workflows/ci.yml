name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run check:biome
      - run: npm run typecheck
      - run: npm test -- --coverage
      - run: npm run build
      - run: npm run pack:check

      - name: Verify dist is committed
        run: |
          git diff --exit-code dist/index.js dist/licenses.txt
