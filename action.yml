name: ContextLevy
description: Estimate AI agent context overhead introduced by a pull request diff.
branding:
  icon: alert
  color: purple

inputs:
  github-token:
    description: 'Fallback token with pull-requests: write when GitHub App auth is not configured'
    required: false
  app-client-id:
    description: 'ContextLevy GitHub App ID. Falls back to CONTEXTLEVY_APP_ID or CONTEXTLEVY_APP_CLIENT_ID env var.'
    required: false
  app-private-key:
    description: 'ContextLevy GitHub App private key PEM. Falls back to CONTEXTLEVY_APP_PRIVATE_KEY env var.'
    required: false
  app-installation-id:
    description: 'Optional installation ID override. Falls back to CONTEXTLEVY_APP_INSTALLATION_ID env var.'
    required: false

outputs:
  total-estimated-tokens:
    description: Total estimated AI-context tokens added by this PR (integer as string)
  analyzed-file-count:
    description: Number of changed files included in the estimate (integer as string)
  token-source:
    description: 'Auth source used for the run: app, github-token, or GITHUB_TOKEN'
  estimation-mode:
    description: 'Token estimation mode used for this run: simple or tokenizer'

runs:
  using: node20
  main: dist/index.js
