name: ContextLevy
description: Estimate AI agent context overhead introduced by a pull request diff.
branding:
  icon: alert
  color: purple

inputs:
  github-token:
    description: 'Fallback token with pull-requests: write when GitHub App auth is not configured'
    required: false
  app-client-id:
    description: 'ContextLevy GitHub App ID. Falls back to CONTEXTLEVY_APP_CLIENT_ID env var.'
    required: false
  app-private-key:
    description: 'ContextLevy GitHub App private key PEM. Falls back to CONTEXTLEVY_APP_PRIVATE_KEY env var.'
    required: false
  app-installation-id:
    description: 'Optional installation ID override. Falls back to CONTEXTLEVY_APP_INSTALLATION_ID env var.'
    required: false
  token-threshold:
    description: Minimum estimated tokens before posting a PR comment
    required: false
    default: '1000'
  large-file-token-threshold:
    description: Per-file token count that triggers the large-file category
    required: false
    default: '5000'
  max-high-impact-items:
    description: Maximum number of high-impact files listed in the comment
    required: false
    default: '5'
  show-cost-table:
    description: Whether to include the pricing cost table in the PR comment
    required: false
    default: 'true'
  pricing-profiles:
    description: 'JSON array of { "name": string, "inputCostPerMillion": number } pricing profiles'
    required: false
    default: ''
  model-pricing:
    description: 'Deprecated alias for pricing-profiles'
    required: false
    default: ''

outputs:
  total-estimated-tokens:
    description: Total estimated AI-context tokens added by this PR
  analyzed-file-count:
    description: Number of changed files included in the estimate
  token-source:
    description: 'Auth source used for the run: app, github-token, or GITHUB_TOKEN'

runs:
  using: node20
  main: dist/index.js
